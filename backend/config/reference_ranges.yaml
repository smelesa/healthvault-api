# Biomarker Reference Ranges
# Sources: CLSI, ADA, ESC, AACE, Endocrine Society
# Loaded at app startup by ReferenceRanges singleton
# See SPEC.md section 2.1.1 for full documentation

GLU:
  display_name: "Fasting Glucose"
  unit: "mg/dL"
  source: "ADA/CLSI"
  ref_male: [70, 100]
  ref_female: [70, 100]
  description: "Fasting blood glucose. Values 100-125 mg/dL indicate prediabetes."

HbA1c:
  display_name: "Hemoglobin A1c"
  unit: "%"
  source: "ADA"
  ref_male: [4.0, 5.6]
  ref_female: [4.0, 5.6]
  description: "Glycated hemoglobin. 5.7-6.4% indicates prediabetes."

CHOL:
  display_name: "Total Cholesterol"
  unit: "mg/dL"
  source: "ESC"
  ref_male: [0, 200]
  ref_female: [0, 200]
  description: "Desirable <200 mg/dL. Borderline high 200-239 mg/dL."

HDL:
  display_name: "HDL Cholesterol"
  unit: "mg/dL"
  source: "ESC"
  ref_male: [40, 60]
  ref_female: [50, 60]
  description: "Low HDL increases cardiovascular risk. Higher is better."

LDL:
  display_name: "LDL Cholesterol"
  unit: "mg/dL"
  source: "ESC"
  ref_male: [0, 100]
  ref_female: [0, 100]
  description: "Optimal <100 mg/dL. Near optimal 100-129 mg/dL."

TG:
  display_name: "Triglycerides"
  unit: "mg/dL"
  source: "ESC"
  ref_male: [0, 150]
  ref_female: [0, 150]
  description: "Normal <150 mg/dL. Borderline high 150-199 mg/dL."

CREAT:
  display_name: "Creatinine"
  unit: "mg/dL"
  source: "CLSI"
  ref_male: [0.7, 1.3]
  ref_female: [0.6, 1.1]
  description: "Kidney function marker. Used in eGFR calculation."

BUN:
  display_name: "Blood Urea Nitrogen"
  unit: "mg/dL"
  source: "CLSI"
  ref_male: [7, 20]
  ref_female: [7, 20]
  description: "Kidney function marker. BUN/Creatinine ratio also informative."

ALT:
  display_name: "Alanine Aminotransferase"
  unit: "U/L"
  source: "CLSI"
  ref_male: [0, 40]
  ref_female: [0, 40]
  description: "Liver enzyme. Elevated may indicate liver damage."

AST:
  display_name: "Aspartate Aminotransferase"
  unit: "U/L"
  source: "CLSI"
  ref_male: [0, 40]
  ref_female: [0, 40]
  description: "Liver enzyme. Often evaluated together with ALT (De Ritis ratio)."

ALP:
  display_name: "Alkaline Phosphatase"
  unit: "U/L"
  source: "CLSI"
  ref_male: [30, 120]
  ref_female: [30, 120]
  description: "Liver/bone marker. Elevated in bone disease, liver obstruction."

HGB:
  display_name: "Hemoglobin"
  unit: "g/dL"
  source: "CLSI"
  ref_male: [13.5, 17.5]
  ref_female: [12.0, 16.0]
  description: "Oxygen-carrying protein in red blood cells."

WBC:
  display_name: "White Blood Cell Count"
  unit: "×10³/µL"
  source: "CLSI"
  ref_male: [4.5, 11.0]
  ref_female: [4.5, 11.0]
  description: "Immune system marker. Low = susceptibility to infection. High = infection/inflammation."

RBC:
  display_name: "Red Blood Cell Count"
  unit: "×10⁶/µL"
  source: "CLSI"
  ref_male: [4.4, 5.8]
  ref_female: [3.9, 5.2]
  description: "Oxygen transport capacity."

PLT:
  display_name: "Platelet Count"
  unit: "×10³/µL"
  source: "CLSI"
  ref_male: [150, 400]
  ref_female: [150, 400]
  description: "Blood clotting. Low = bleeding risk. High = clotting risk."

TSH:
  display_name: "Thyroid Stimulating Hormone"
  unit: "mIU/L"
  source: "AACE"
  ref_male: [0.4, 4.0]
  ref_female: [0.4, 4.0]
  description: "Thyroid function. <0.4 = hyperthyroid, >4.0 = hypothyroid."

VITD:
  display_name: "Vitamin D (25-OH)"
  unit: "ng/mL"
  source: "Endocrine Society"
  ref_male: [30, 100]
  ref_female: [30, 100]
  description: "Nutritional status. <20 ng/mL = deficiency. 20-29 = insufficiency."

IRON:
  display_name: "Serum Iron"
  unit: "µg/dL"
  source: "CLSI"
  ref_male: [65, 175]
  ref_female: [50, 170]
  description: "Iron metabolism. Low = anemia risk. High = iron overload."

FERR:
  display_name: "Ferritin"
  unit: "ng/mL"
  source: "CLSI"
  ref_male: [20, 300]
  ref_female: [20, 200]
  description: "Iron stores. Also acute phase reactant — elevated in inflammation."